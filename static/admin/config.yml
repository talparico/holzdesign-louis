backend:
  name: git-gateway
  branch: main

media_folder: static/uploads
public_folder: /uploads

locale: de

collections:
  - name: projekte
    label: Projekte
    files:
      - label: Alle Projekte
        name: alle-projekte
        file: src/content/projekte/projekte.json
        fields:
          - label: Projekte
            name: projekte
            widget: list
            label_singular: Projekt
            summary: "{{fields.title}} – {{fields.kategorie}}"
            fields:
              - { label: Projekttitel, name: title, widget: string, hint: "z.B. Eichenschrank Familie Müller" }
              - label: Kategorie
                name: kategorie
                widget: select
                options:
                  - { label: "Möbel", value: "möbel" }
                  - { label: "Küchen", value: "küchen" }
                  - { label: "Türen / Fenster", value: "türen-fenster" }
                  - { label: "Allgemeiner Holzbau", value: "holzbau" }
                  - { label: "Gebäudehülle", value: "gebäudehülle" }
                  - { label: "Terrasse", value: "terrasse" }
              - label: Bilder
                name: bilder
                widget: list
                label_singular: Bild
                minimize_collapsed: true
                fields:
                  - { label: Bild hochladen, name: bild, widget: image }
                  - { label: Bildbeschreibung, name: alt, widget: string }
              - { label: Kurzbeschreibung, name: description, widget: text }
              - { label: Detailtext (optional), name: body, widget: string, required: false }
              - { label: Jahr, name: jahr, widget: number, default: 2026 }
              - { label: Auf Startseite hervorheben, name: featured, widget: boolean, default: false }
              - { label: Slug, name: slug, widget: string, hint: "Eindeutige ID z.B. eichenschrank-2026" }

  - name: einstellungen
    label: Einstellungen
    files:
      - label: Homepage
        name: homepage
        file: src/content/einstellungen/homepage.json
        fields:
          - { label: Hero Badge, name: heroBadge, widget: string, default: "Traditionelles Handwerk" }
          - { label: Hero Titel, name: heroTitel, widget: string, default: "Wo Präzision auf Natur trifft" }
          - { label: Hero Text, name: heroText, widget: text, default: "Massgeschneiderte Holzarbeiten für gehobene Wohnräume." }
          - label: Kennzahlen
            name: kennzahlen
            widget: list
            fields:
              - { label: Zahl, name: zahl, widget: string }
              - { label: Beschriftung, name: label, widget: string }
          - { label: Philosophie Titel, name: philosophieTitel, widget: string }
          - { label: Philosophie Text 1, name: philosophieText1, widget: text }
          - { label: Philosophie Text 2, name: philosophieText2, widget: text }
          - { label: Region Titel, name: regionTitel, widget: string }
          - label: Leistungs-Kacheln (Homepage)
            name: kacheln
            widget: list
            label_singular: Kachel
            summary: "{{fields.titel}}"
            fields:
              - { label: Titel, name: titel, widget: string }
              - { label: Text, name: text, widget: text }
              - { label: Bild, name: bild, widget: image }
              - { label: Link, name: href, widget: string, hint: "z.B. /referenzen#möbel" }
          - { label: Region Text, name: regionText, widget: text }

      - label: Kontaktseite
        name: kontakt
        file: src/content/einstellungen/kontakt.json
        fields:
          - { label: Hero Titel, name: heroTitel, widget: string }
          - { label: Hero Text, name: heroText, widget: text }
          - { label: Öffnungszeiten Zeile 1, name: oeffnung1, widget: string, hint: "z.B. Montag – Freitag" }
          - { label: Öffnungszeiten Zeile 2, name: oeffnung2, widget: string, hint: "z.B. 07:30 – 17:30 Uhr" }
          - { label: Öffnungszeiten Zusatz, name: oeffnungZusatz, widget: string, hint: "z.B. Samstag nach Vereinbarung" }

      - label: Kontakt & Firma
        name: allgemein
        file: src/content/einstellungen/allgemein.json
        fields:
          - { label: Firmenname, name: firmenname, widget: string }
          - { label: Telefon, name: telefon, widget: string }
          - { label: E-Mail, name: email, widget: string }
          - { label: Adresse, name: adresse, widget: text }
          - { label: LinkedIn URL, name: linkedin, widget: string, required: false, hint: "z.B. https://www.linkedin.com/company/holzdesign-louis" }

      - label: Über Holzdesign Louis
        name: ueber-uns
        file: src/content/einstellungen/ueber-uns.json
        fields:
          - { label: Hero Titel, name: heroTitel, widget: string }
          - { label: Hero Text, name: heroText, widget: text }
          - { label: Thomas Titel, name: thomasTitel, widget: string }
          - { label: Thomas Text 1, name: thomasText1, widget: text }
          - { label: Thomas Text 2, name: thomasText2, widget: text }
          - { label: Thomas Text 3, name: thomasText3, widget: text }
          - label: Werte-Kacheln
            name: werte
            widget: list
            fields:
              - { label: Icon (Material Icon Name), name: icon, widget: string, hint: "z.B. favorite, handshake, nature" }
              - { label: Titel, name: titel, widget: string }
              - { label: Text, name: text, widget: text }
          - label: Meilensteine
            name: meilensteine
            widget: list
            fields:
              - { label: Jahr, name: jahr, widget: string }
              - { label: Titel, name: titel, widget: string }
              - { label: Text, name: text, widget: text }

      - label: SEO
        name: seo
        file: src/content/einstellungen/seo.json
        fields:
          - { label: "Homepage – SEO Titel", name: seoTitel, widget: string, hint: "50-65 Zeichen" }
          - { label: "Homepage – Meta Description", name: metaDescription, widget: text, hint: "145-160 Zeichen" }
          - { label: "Kontakt – SEO Titel", name: kontaktTitel, widget: string, hint: "50-65 Zeichen" }
          - { label: "Kontakt – Meta Description", name: kontaktDescription, widget: text, hint: "145-160 Zeichen" }
          - { label: "Referenzen – SEO Titel", name: referenzenTitel, widget: string, hint: "50-65 Zeichen" }
          - { label: "Referenzen – Meta Description", name: referenzenDescription, widget: text, hint: "145-160 Zeichen" }
