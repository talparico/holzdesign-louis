<!DOCTYPE html>
<html lang="de" hreflang="de-ch">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>

    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }

      // Active nav highlight - runs on every navigation
      function setActiveNav() {
        const path = window.location.pathname;
        document.querySelectorAll('[data-navlink]').forEach(el => {
          const href = el.getAttribute('data-navlink');
          const isActive = href === '/' ? path === '/' : path === href || path.startsWith(href + '/');
          el.classList.toggle('nav-link--active', isActive);
        });
      }

      // Run on load
      document.addEventListener('DOMContentLoaded', setActiveNav);

      // Run on SvelteKit navigation
      document.addEventListener('sveltekit:navigation-end', setActiveNav);
    </script>
  </body>
</html>
